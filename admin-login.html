<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>
<body>

    <div class="login-box">

        <h2>Admin Login</h2>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/admin-login.js"></script>

</body>
</html>
